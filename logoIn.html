<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<style>
    .box{
        width: 100%;
        height: 300px;
        padding: 10px;
    }
    img{
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 5px;
    }
    .slider {top: none}
    .prev_arrow{
        color: white;
        font-size: 3rem;
        position: relative;
        top: 180px;
        z-index: 10;
        left: 30px;
        background: rgba(255, 255, 255, 0.342);
        padding: 5px 17px;
        border-radius: 50%;
    }
    .next_arrow{
        color: rgb(255, 255, 255);
        font-size: 3rem;
        position: absolute;
        top: 180px;
        z-index: 10;
        right: 30px;
        background: rgba(255, 255, 255, 0.342);
        padding: 5px 17px;
        border-radius: 50%;
    }
    .slider .slider-items {top: none}
</style>
<body>
    <ul class="slide">
        <li>Slide 1</li>
        <li>Slide 2</li>
        <li>Slide 3</li>
        <li>Slide 4</li>
        <li>Slide 5</li>
    </ul>
    <hr>
    <div class="slide" data-slick='{"slidesToShow": 4, "slidesToScroll": 4}'>
        <div class="box"><img src="/image/avengerEndgame.webp" alt=""></div>
        <div class="box"><img src="/image/incredibleHulk.webp" alt=""></div>
        <div class="box"><img src="/image/jackofgiant.jpg" alt=""></div>
        <div class="box"><img src="/image/kingkong.jpg" alt=""></div>
        <div class="box"><img src="/image/spidermannowayhome.webp" alt=""></div>
        <div class="box"><img src="/image/sunwukong.jpg" alt=""></div>
        <div class="box"><img src="/image/thorRagnarok.webp" alt=""></div>
        <div class="box"><img src="/image/venom.jpg" alt=""></div>
        <div class="box"><img src="/image/avengerEndgame.webp" alt=""></div>
        <div class="box"><img src="/image/incredibleHulk.webp" alt=""></div>
        <div class="box"><img src="/image/jackofgiant.jpg" alt=""></div>
        <div class="box"><img src="/image/kingkong.jpg" alt=""></div>
        <div class="box"><img src="/image/spidermannowayhome.webp" alt=""></div>
        <div class="box"><img src="/image/sunwukong.jpg" alt=""></div>
    </div>



    <script src="https://code.jquery.com/jquery-3.7.0.min.js" integrity="sha256-2Pmvv0kuTBOenSvLm6bvfBSSHrUJ+3A7x6P5Ebd07/g=" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.js"></script>
    <script>
        $('.slide').slick({
            slidesToShow: 4,
            slidesToScroll: 3,
            autoplay: true,
            autoplaySpeed: 2000,
            prevArrow: '<span class="prev_arrow"><i class="fa-solid fa-chevron-left"></i></span>',
            nextArrow: '<span class="next_arrow"><i class="fa-solid fa-chevron-right"></i></span>',
          });
    </script>
</body>
</html>
